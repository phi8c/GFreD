<script>
 
  const endTime = new Date("{{ end_time }}");
  const countdown = document.getElementById("countdown");
  const examForm = document.getElementById("examForm");
  let interval;

  function updateCountdown() {
    const now = new Date();
    const remaining = endTime - now;

    if (remaining <= 0) {
      countdown.textContent = "⏱ Hết giờ!";
      clearInterval(interval);
      alert("Đã hết giờ, hệ thống sẽ tự động nộp bài.");
      examForm.submit();
    } else {
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      countdown.textContent = `${mins} phút ${secs < 10 ? '0' : ''}${secs} giây`;
    }
  }

  updateCountdown();
  interval = setInterval(updateCountdown, 1000); // mỗi giây

const socket = io('/webrtc', {
  path: '/socket.io',
  transports: ['websocket', 'polling']
});
const roomCode = "{{ room_code }}";
const studentCode = "{{ student_code }}";
const studentName = "{{ student_name }}";
const className = "{{ class_name }}";

console.log("📤 Emitting new-student-joined", { room_code: roomCode, studentCode});


socket.on('connect', () => {
socket.emit('join_room', { room: roomCode });
socket.emit('join_room', { room: studentCode });

socket.emit('new-student-joined', {
    room: roomCode,
    student_code: studentCode,
    student_name: studentName,   // Thêm vào
    class_name: className 
    //student_name: studentName,
});
});

const peers = {};

// Gửi offer đến giảng viên
async function sendToInstructor(type, stream) {
  const pc = new RTCPeerConnection();
  peers[type] = pc;

  stream.getTracks().forEach(track => { 
    console.log("📡 Gửi track:", track.kind);
    pc.addTrack(track, stream); });

  pc.onicecandidate = event => {
    if (event.candidate) {
      socket.emit('ice-candidate', {
        room: roomCode,
        candidate: event.candidate,
        type: type,
        student_code: studentCode
      });
    }
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  socket.emit('offer', {
    room: roomCode,
    offer,
    type: type,
    student_code: studentCode
  });

  socket.on('answer', data => {
    if (data.student_code === studentCode && data.type === type) {
      pc.setRemoteDescription(new RTCSessionDescription(data.answer));
    }
  });

  socket.on('kicked', function(data) {
    alert(data.message || 'Bạn đã bị đuổi khỏi phòng thi.');
    window.location.href = '/join-room';
});
}
function sendLog(type, detail = "") {
    const timestamp = new Date().toISOString();

    socket.emit("log_event", {
        student_name: "{{ student_name }}",
        room_code: "{{ room_code }}",
        type: type,
        detail: detail,
        timestamp: timestamp
    });
}
 socket.on('kicked', function(data) {
    alert(data.message || 'Bạn đã bị đuổi khỏi phòng thi.'); 
    window.location.href = '/join-room';       
});


   socket.on('banned', function(data) {

    window.location.href = '/join-room';       
});


// Mở camera
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    document.getElementById('localCamera').srcObject = stream;
    await sendToInstructor('camera', stream);
    console.log("✅ Đã gửi camera đến giảng viên");
  } catch (err) {
    console.error("Không thể mở camera:", err);
  }
}

// Chia sẻ màn hình
async function startScreenShare() {
  try {
    const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
    await sendToInstructor('screen', screenStream);
    console.log("✅ Đã chia sẻ màn hình đến giảng viên");
  } catch (err) {
    console.error("Không thể chia sẻ màn hình:", err);
  }
}

window.onload = async () => {
  await startCamera();
  await startScreenShare();
}

socket.on("resend-stream", () => {

});

<script>
function sendLog(type, detail = "") {
    const timestamp = new Date().toISOString();
    console.log(`[LOG][${timestamp}] ${type} - ${detail}`);
}

// 👁️ Phát hiện DevTools
setInterval(() => {
    const start = performance.now();
    debugger;
    const delay = performance.now() - start;
    if (delay > 100) {
        sendLog("devtools_opened", "Phát hiện DevTools đang mở");
    }
}, 1000);

// 🔁 Rời / quay lại tab
window.addEventListener("blur", () => sendLog("window_blur", "Rời khỏi tab"));
window.addEventListener("focus", () => sendLog("window_focus", "Quay lại tab"));

// 📋 Hành vi sao chép / dán
document.addEventListener("copy", () => sendLog("copy", "Sao chép nội dung"));
document.addEventListener("cut", () => sendLog("cut", "Cắt nội dung"));
document.addEventListener("paste", (e) => {
    const pasted = e.clipboardData.getData("text").slice(0, 100);
    sendLog("paste", "Dán: " + pasted);
});
document.addEventListener("contextmenu", () => sendLog("right_click", "Chuột phải"));

// 🔄 Reload hoặc đóng tab
window.addEventListener("beforeunload", () => {
    sendLog("page_unload", "Reload hoặc đóng tab");
});

// ⏱️ Trả lời quá nhanh
const answerTimers = {};
document.querySelectorAll('input[type=radio]').forEach(input => {
    const name = input.name;
    if (!answerTimers[name]) {
        answerTimers[name] = Date.now();
    }
    input.addEventListener("change", () => {
        const timeTaken = Date.now() - answerTimers[name];
        if (timeTaken < 3000) {
            sendLog("answer_too_fast", `Trả lời ${name} sau ${timeTaken / 1000}s`);
        }
    });
});
</script>
