<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Web App Sinh Câu Hỏi{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
        }
        .custom-header {
            background-color: #ddd;
            padding: 15px 0;
        }
        .logo-text {
            font-weight: bold;
            font-size: 1.2rem;
        }
        .main-content {
            height: 75vh; /* chiếm 75% chiều cao viewport */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.5rem;
            color: #333;
        }
        .nav-link-custom {
            color: #000;
            text-decoration: none;
            margin-left: 15px;
        }
        .nav-link-custom:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
   
    <!-- Header -->
    <header class="custom-header">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="logo-text">
                <img src="{{ url_for('static', filename='icons/EKA.png') }}" alt="ReturnQ Logo" class="header-logo-icon">
               
            </div>
            <nav>
                <a class="nav-link-custom" href="{{ url_for('auth.home') }}">Trang chủ</a>
                
                    <a class="nav-link-custom" href="{{ url_for('auth.login') }}">Đăng nhập</a>
                    <a class="nav-link-custom" href="{{ url_for('auth.register') }}">Đăng ký</a> 
                
            </nav>
        </div>
    </header>

    <main class="anm">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flash">
                     <div class="alert alert-info">
                    {% for message in messages %}
                        <div>{{ message }}</div>
                    {% endfor %}
                     </div>
                </ul>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='scripts.js') }}"></script>

</body>
</html>
